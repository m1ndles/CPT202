spring.application.name=community-auth-demo

# 生产环境数据库：本机 MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/heritage_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=Udtime347
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# 建表脚本
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Web
server.port=8080
server.servlet.session.timeout=30m
server.error.include-message=always
server.error.include-stacktrace=never

# 上传
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload-dir=/opt/cpt202/uploads

# 日志
logging.file.name=/opt/cpt202/logs/app.log
logging.level.root=INFO
logging.level.com.cpt202=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
