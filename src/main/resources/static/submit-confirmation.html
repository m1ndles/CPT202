<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Confirmed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eef5f2',
              100: '#dbe9e3',
              200: '#b8d2c8',
              300: '#91b8aa',
              400: '#679b8a',
              500: '#376757',
              600: '#2d5648',
              700: '#25473d',
              800: '#1d3830',
              900: '#162c26'
            }
          },
          fontFamily: {
            headline: ['Noto Serif SC', 'serif'],
            body: ['Manrope', 'sans-serif']
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-[linear-gradient(180deg,#f9faf7_0%,#f2f5f1_100%)] font-body text-slate-800">
  <main class="mx-auto flex min-h-screen max-w-3xl items-center px-4 py-12 sm:px-6">
    <section class="w-full rounded-[28px] border border-primary-100 bg-white/95 p-8 shadow-[0_18px_40px_rgba(55,103,87,0.10)] sm:p-10">
      <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-emerald-100 text-emerald-700">
        <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="font-headline text-3xl font-bold text-primary-700">Submission Confirmed</h1>
      <p class="mt-3 text-slate-600">Your heritage resource has been submitted into the review workflow. Please keep the tracking ID below for follow-up.</p>

      <div class="mt-8 rounded-2xl border border-primary-200 bg-primary-50 px-5 py-4">
        <div class="text-sm font-medium text-primary-700">Tracking ID</div>
        <div id="trackingId" class="mt-2 text-2xl font-bold text-primary-900">--</div>
      </div>

      <div class="mt-4 rounded-2xl border border-slate-200 bg-slate-50 px-5 py-4 text-sm text-slate-600">
        <div>Resource ID: <span id="resourceId" class="font-semibold text-slate-800">--</span></div>
        <div class="mt-2">Status: <span class="font-semibold text-amber-700">Pending Review</span></div>
      </div>

      <div class="mt-8 flex flex-wrap gap-3">
        <a href="/index.html" class="rounded-lg bg-primary-600 px-5 py-2.5 font-medium text-white transition-colors hover:bg-primary-700">Back to Home</a>
        <a id="viewSubmissionLink" href="/submit-resource.html" class="rounded-lg border border-slate-300 px-5 py-2.5 font-medium text-slate-700 transition-colors hover:bg-slate-50">View Submitted Draft</a>
      </div>
    </section>
  </main>

  <script type="module" src="/js/submit-confirmation.js"></script>
</body>
</html>
